name: Feature request
description: Suggest a new chain, validator improvement, or feature.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. New chain validators are the most common
        contribution — see [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md)
        for the recipe.

  - type: dropdown
    id: kind
    attributes:
      label: What kind of feature?
      options:
        - New chain validator
        - Improvement to existing validator (broader recovery, better masking)
        - Output format / CLI flag
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? What's painful?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the tool do? An example invocation + output is ideal.
      render: shell
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools or workarounds you've tried.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to specs, BIPs, existing tools, or test vectors.
